name: Build Plugin Zip

on:
  workflow_dispatch:
  issue_comment:
    types: [created]

jobs:
  build:
    name: "Build plugin zip"
    runs-on: ubuntu-latest
    # Don't run on forks.
    if: >
      github.repository_owner == 'Yoast' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          startsWith(github.event.comment.body, '/build-zip')
        )
      )

    steps:
      - name: Check actions access
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login
            });
            if (!['admin', 'maintain', 'write', 'triage'].includes(data.role_name)) {
              core.setFailed(`User ${context.payload.comment.user.login} does not have actions access.`);
            }

      - name: Add reaction to command
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Get PR head ref
        if: github.event_name == 'issue_comment'
        id: pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('ref', pr.head.ref);

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.pr.outputs.ref || '' }}
          persist-credentials: false

      - name: Install PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: 7.4
          coverage: none

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: './.nvmrc'

      - name: Yarn install
        run: yarn install

      - name: "Grunt: create artifact"
        run: grunt artifact

      - name: Set timestamp
        id: timestamp
        run: echo "value=$(date +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Stage artifact under a wrapper folder
        run: |
          mkdir staging
          mv artifact staging/wordpress-seo

      - name: Upload zip
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wordpress-seo-${{ steps.timestamp.outputs.value }}
          path: staging/
          retention-days: 1

      - name: Post artifact link
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `📦 Plugin zip built successfully!\n\nDownload it from the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).`
            });
